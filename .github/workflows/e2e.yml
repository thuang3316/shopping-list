name: E2E (nightly)

# Heavier/slower than the unit + API gate, so it runs on a schedule and on
# demand rather than blocking every push. See guides/testing.md.
on:
  schedule:
    - cron: '0 7 * * *' # daily ~07:00 UTC
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright (mobile + desktop)
    runs-on: ubuntu-latest
    # Shares the Neon test branch with the API job — serialize to avoid races.
    concurrency:
      group: neon-test-branch
      cancel-in-progress: false
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run db:migrate:test # idempotent; ensures the test branch has schema
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
